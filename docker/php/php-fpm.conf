[www]
user = www-data
group = www-data

listen = 9000

pm = dynamic
pm.max_children = 20
pm.start_servers = 6
pm.min_spare_servers = 2
pm.max_spare_servers = 10

; Send FPM logs to stderr so Docker captures them
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Clear environment — all vars come from compose
clear_env = no
